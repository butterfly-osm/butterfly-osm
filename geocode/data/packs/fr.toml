# France country pack — butterfly-geocode #96 "serve the world".
# Authoritative dataset: BAN (Base Adresse Nationale), 26M records,
# Licence Ouverte 2.0. See geocode-data/SOURCES.md.

[country]
iso2 = "FR"
name = "France"

[postcode]
# 5-digit, range 01000-95999 + Corsica (200xx, 201xx). La Poste / UPU.
regex = '\b\d{5}\b'
position = "trailing"
canonicalize = "none"

[scripts]
dominant = ["Latin"]
secondary = []

[[lexical_cues.match]]
substring = "rue"
boost = 1.5
kind = "word"
[[lexical_cues.match]]
substring = "avenue"
boost = 1.5
kind = "word"
[[lexical_cues.match]]
substring = "boulevard"
boost = 1.5
kind = "word"
[[lexical_cues.match]]
substring = "chaussée"
boost = 1.0
kind = "word"
[[lexical_cues.match]]
substring = "impasse"
boost = 1.0
kind = "word"
[[lexical_cues.match]]
substring = "place"
boost = 1.0
kind = "word"
[[lexical_cues.match]]
substring = "allée"
boost = 1.0
kind = "word"
[[lexical_cues.match]]
substring = "quai"
boost = 0.8
kind = "word"
[[lexical_cues.match]]
substring = "paris"
boost = 2.0
kind = "word"
[[lexical_cues.match]]
substring = "marseille"
boost = 2.0
kind = "word"
[[lexical_cues.match]]
substring = "lyon"
boost = 2.0
kind = "word"
[[lexical_cues.match]]
substring = "toulouse"
boost = 2.0
kind = "word"
[[lexical_cues.match]]
substring = "strasbourg"
boost = 2.0
kind = "word"
[[lexical_cues.match]]
substring = "bordeaux"
boost = 2.0
kind = "word"
[[lexical_cues.match]]
substring = "nice"
boost = 2.0
kind = "word"
[[lexical_cues.match]]
substring = "nantes"
boost = 2.0
kind = "word"

[bbox]
# Mainland France + Corsica. DOM-TOMs intentionally excluded.
min_lat = 41.30
max_lat = 51.15
min_lon = -5.25
max_lon = 9.65

[neighbours]
codes = ["BE", "LU", "DE", "CH", "IT", "ES"]

[source_priors]
osm = 0.5
authoritative = 1.0

[osm_tags]
postcode = "addr:postcode"
street = "addr:street"
housenumber = "addr:housenumber"
city = "addr:city"
