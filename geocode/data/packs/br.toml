# Brazil country pack — butterfly-geocode #96 "serve the world".

[country]
iso2 = "BR"
name = "Brazil"

[postcode]
# CEP — 8-digit, optional dash after first 5 (e.g. "01310-200").
# Source: Correios.
regex = '\b\d{5}-?\d{3}\b'
position = "trailing"
canonicalize = "collapse_whitespace"

[scripts]
dominant = ["Latin"]
secondary = []

# Portuguese street types.
[[lexical_cues.match]]
substring = "rua"
boost = 1.5
kind = "word"
[[lexical_cues.match]]
substring = "avenida"
boost = 1.5
kind = "word"
[[lexical_cues.match]]
substring = "alameda"
boost = 1.2
kind = "word"
[[lexical_cues.match]]
substring = "praça"
boost = 1.4
kind = "word"
[[lexical_cues.match]]
substring = "praca"
boost = 1.0
kind = "word"
[[lexical_cues.match]]
substring = "travessa"
boost = 1.0
kind = "word"
[[lexical_cues.match]]
substring = "estrada"
boost = 1.0
kind = "word"
# Major cities.
[[lexical_cues.match]]
substring = "são paulo"
boost = 2.0
kind = "substring"
[[lexical_cues.match]]
substring = "sao paulo"
boost = 1.8
kind = "substring"
[[lexical_cues.match]]
substring = "rio de janeiro"
boost = 2.0
kind = "substring"
[[lexical_cues.match]]
substring = "salvador"
boost = 1.8
kind = "word"
[[lexical_cues.match]]
substring = "brasília"
boost = 2.0
kind = "word"
[[lexical_cues.match]]
substring = "brasilia"
boost = 1.8
kind = "word"
[[lexical_cues.match]]
substring = "fortaleza"
boost = 1.8
kind = "word"
[[lexical_cues.match]]
substring = "belo horizonte"
boost = 2.0
kind = "substring"
[[lexical_cues.match]]
substring = "manaus"
boost = 1.8
kind = "word"
[[lexical_cues.match]]
substring = "curitiba"
boost = 1.8
kind = "word"
[[lexical_cues.match]]
substring = "porto alegre"
boost = 2.0
kind = "substring"
[[lexical_cues.match]]
substring = "recife"
boost = 1.8
kind = "word"

[bbox]
min_lat = -33.75
max_lat = 5.27
min_lon = -73.99
max_lon = -34.79

[neighbours]
codes = ["AR", "BO", "CO", "GF", "GY", "PE", "PY", "SR", "UY", "VE"]

[source_priors]
osm = 0.7
authoritative = 0.5

[osm_tags]
postcode = "addr:postcode"
street = "addr:street"
housenumber = "addr:housenumber"
city = "addr:city"
