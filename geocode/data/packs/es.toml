# Spain country pack — butterfly-geocode #96 "serve the world".

[country]
iso2 = "ES"
name = "Spain"

[postcode]
# 5-digit, range 01000-52999 (province prefix + locality digits). Correos / UPU.
regex = '\b[0-5]\d{4}\b'
position = "trailing"
canonicalize = "none"

[scripts]
dominant = ["Latin"]
secondary = []

[[lexical_cues.match]]
substring = "calle"
boost = 1.5
kind = "word"
[[lexical_cues.match]]
substring = "avenida"
boost = 1.4
kind = "word"
[[lexical_cues.match]]
substring = "plaza"
boost = 1.2
kind = "word"
[[lexical_cues.match]]
substring = "paseo"
boost = 1.2
kind = "word"
[[lexical_cues.match]]
substring = "carrer"
boost = 1.2
kind = "word"
[[lexical_cues.match]]
substring = "carretera"
boost = 1.0
kind = "word"
[[lexical_cues.match]]
substring = "madrid"
boost = 2.0
kind = "word"
[[lexical_cues.match]]
substring = "barcelona"
boost = 2.0
kind = "word"
[[lexical_cues.match]]
substring = "valencia"
boost = 2.0
kind = "word"
[[lexical_cues.match]]
substring = "sevilla"
boost = 2.0
kind = "word"
[[lexical_cues.match]]
substring = "seville"
boost = 1.5
kind = "word"
[[lexical_cues.match]]
substring = "zaragoza"
boost = 2.0
kind = "word"
[[lexical_cues.match]]
substring = "málaga"
boost = 2.0
kind = "word"
[[lexical_cues.match]]
substring = "bilbao"
boost = 2.0
kind = "word"
[[lexical_cues.match]]
substring = "granada"
boost = 2.0
kind = "word"

[bbox]
# Mainland Spain + Balearic Islands + Canary Islands.
min_lat = 27.60
max_lat = 43.80
min_lon = -18.20
max_lon = 4.35

[neighbours]
codes = ["FR", "PT"]

[source_priors]
osm = 0.7
authoritative = 0.5

[osm_tags]
postcode = "addr:postcode"
street = "addr:street"
housenumber = "addr:housenumber"
city = "addr:city"
