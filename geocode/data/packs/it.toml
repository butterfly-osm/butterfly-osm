[bbox]
# Mainland Italy + Sicily + Sardinia.
min_lat = 35.40
max_lat = 47.10
min_lon = 6.60
max_lon = 18.55

[neighbours]
codes = ["FR", "CH", "AT", "SI"]

[source_priors]
osm = 0.7
authoritative = 0.5

[osm_tags]
postcode = "addr:postcode"
street = "addr:street"
housenumber = "addr:housenumber"
city = "addr:city"
