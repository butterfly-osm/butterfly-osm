# Italy country pack — butterfly-geocode #96 "serve the world".

[country]
iso2 = "IT"
name = "Italy"

[postcode]
# 5-digit CAP, range 00010-98168. Poste Italiane / UPU.
regex = '\b\d{5}\b'
position = "trailing"
canonicalize = "none"

[scripts]
dominant = ["Latin"]
secondary = []

[[lexical_cues.match]]
substring = "via"
boost = 1.5
kind = "word"
[[lexical_cues.match]]
substring = "viale"
boost = 1.5
kind = "word"
[[lexical_cues.match]]
substring = "piazza"
boost = 1.4
kind = "word"
[[lexical_cues.match]]
substring = "corso"
boost = 1.4
kind = "word"
[[lexical_cues.match]]
substring = "vicolo"
boost = 1.0
kind = "word"
[[lexical_cues.match]]
substring = "largo"
boost = 0.9
kind = "word"
[[lexical_cues.match]]
substring = "roma"
boost = 2.0
kind = "word"
[[lexical_cues.match]]
substring = "rome"
