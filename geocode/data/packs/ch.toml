# Switzerland country pack — butterfly-geocode #96 "serve the world".

[country]
iso2 = "CH"
name = "Switzerland"

[postcode]
# 4-digit Swiss Post NPA, range 1000-9999.
regex = '\b[1-9]\d{3}\b'
position = "leading"
canonicalize = "none"

[scripts]
dominant = ["Latin"]
secondary = []

# Quadri-lingual: German + French + Italian + Romansh.
[[lexical_cues.match]]
substring = "strasse"
boost = 1.5
kind = "substring"
[[lexical_cues.match]]
substring = "rue"
boost = 1.0
kind = "word"
[[lexical_cues.match]]
substring = "via"
boost = 0.7
kind = "word"
[[lexical_cues.match]]
substring = "platz"
boost = 1.0
kind = "substring"
[[lexical_cues.match]]
substring = "place"
boost = 0.7
kind = "word"
[[lexical_cues.match]]
substring = "zürich"
boost = 2.0
kind = "word"
[[lexical_cues.match]]
substring = "zurich"
boost = 1.5
kind = "word"
[[lexical_cues.match]]
substring = "genève"
boost = 2.0
kind = "word"
[[lexical_cues.match]]
substring = "geneva"
boost = 1.5
kind = "word"
[[lexical_cues.match]]
substring = "bern"
boost = 1.5
kind = "word"
[[lexical_cues.match]]
substring = "basel"
boost = 2.0
kind = "word"
[[lexical_cues.match]]
substring = "lausanne"
boost = 2.0
kind = "word"
[[lexical_cues.match]]
substring = "lugano"
boost = 2.0
kind = "word"

[bbox]
min_lat = 45.75
max_lat = 47.90
min_lon = 5.90
max_lon = 10.55

[neighbours]
codes = ["FR", "DE", "AT", "IT"]

[source_priors]
osm = 0.7
authoritative = 1.0

[osm_tags]
postcode = "addr:postcode"
street = "addr:street"
housenumber = "addr:housenumber"
city = "addr:city"
