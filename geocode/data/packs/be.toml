# Belgium country pack — butterfly-geocode #96 "serve the world".
# Authoritative dataset: BeSt Address (BOSA). See geocode-data/SOURCES.md.

[country]
iso2 = "BE"
name = "Belgium"

[postcode]
# 4-digit, leading non-zero. Range 1000-9999. bpost / UPU.
regex = '\b[1-9]\d{3}\b'
position = "trailing"
canonicalize = "none"

[scripts]
dominant = ["Latin"]
secondary = []

[[lexical_cues.match]]
substring = "rue"
boost = 1.0
kind = "word"
[[lexical_cues.match]]
substring = "avenue"
boost = 1.0
kind = "word"
[[lexical_cues.match]]
substring = "boulevard"
boost = 1.0
kind = "word"
[[lexical_cues.match]]
substring = "chaussée"
boost = 1.0
kind = "word"
[[lexical_cues.match]]
substring = "chaussee"
boost = 0.8
kind = "word"
[[lexical_cues.match]]
substring = "straat"
boost = 1.1
kind = "substring"
[[lexical_cues.match]]
substring = "laan"
boost = 0.9
kind = "substring"
[[lexical_cues.match]]
substring = "plein"
boost = 0.9
kind = "substring"
[[lexical_cues.match]]
substring = "gracht"
boost = 0.9
kind = "substring"
[[lexical_cues.match]]
substring = "brussels"
boost = 2.0
kind = "word"
[[lexical_cues.match]]
substring = "bruxelles"
boost = 2.0
kind = "word"
[[lexical_cues.match]]
substring = "brussel"
boost = 2.0
kind = "word"
[[lexical_cues.match]]
substring = "anderlecht"
boost = 2.0
kind = "word"
[[lexical_cues.match]]
substring = "antwerpen"
boost = 2.0
kind = "word"
[[lexical_cues.match]]
substring = "antwerp"
boost = 2.0
kind = "word"
[[lexical_cues.match]]
substring = "anvers"
boost = 2.0
kind = "word"
[[lexical_cues.match]]
substring = "liège"
boost = 2.0
kind = "word"
[[lexical_cues.match]]
substring = "liege"
boost = 1.5
kind = "word"
[[lexical_cues.match]]
substring = "gent"
boost = 2.0
kind = "word"
[[lexical_cues.match]]
substring = "ghent"
boost = 1.5
kind = "word"

[bbox]
min_lat = 49.50
max_lat = 51.55
min_lon = 2.50
max_lon = 6.45

[neighbours]
codes = ["FR", "NL", "LU", "DE"]

[source_priors]
osm = 0.5
authoritative = 1.0

[osm_tags]
postcode = "addr:postcode"
street = "addr:street"
housenumber = "addr:housenumber"
city = "addr:city"
