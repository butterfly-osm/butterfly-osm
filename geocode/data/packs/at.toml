# Austria country pack — butterfly-geocode #96 "serve the world".

[country]
iso2 = "AT"
name = "Austria"

[postcode]
# 4-digit, leading 1-9. Österreichische Post / UPU.
regex = '\b[1-9]\d{3}\b'
position = "leading"
canonicalize = "none"

[scripts]
dominant = ["Latin"]
secondary = []

[[lexical_cues.match]]
substring = "straße"
boost = 1.5
kind = "substring"
[[lexical_cues.match]]
substring = "strasse"
boost = 1.2
kind = "substring"
[[lexical_cues.match]]
substring = "gasse"
boost = 1.4
kind = "substring"
[[lexical_cues.match]]
substring = "platz"
boost = 1.2
kind = "substring"
[[lexical_cues.match]]
substring = "ring"
boost = 0.8
kind = "word"
[[lexical_cues.match]]
substring = "wien"
boost = 2.0
kind = "word"
[[lexical_cues.match]]
substring = "vienna"
boost = 1.5
kind = "word"
[[lexical_cues.match]]
substring = "salzburg"
boost = 2.0
kind = "word"
[[lexical_cues.match]]
substring = "graz"
boost = 2.0
kind = "word"
[[lexical_cues.match]]
substring = "innsbruck"
boost = 2.0
kind = "word"
[[lexical_cues.match]]
substring = "linz"
boost = 2.0
kind = "word"

[bbox]
min_lat = 46.32
max_lat = 49.05
min_lon = 9.50
max_lon = 17.20

[neighbours]
codes = ["DE", "CH", "IT"]

[source_priors]
osm = 0.7
authoritative = 1.0

[osm_tags]
postcode = "addr:postcode"
street = "addr:street"
housenumber = "addr:housenumber"
city = "addr:city"
