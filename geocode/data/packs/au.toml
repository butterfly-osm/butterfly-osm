# Australia country pack — butterfly-geocode #96 "serve the world".
# Authoritative dataset: G-NAF (Geocoded National Address File), 15M
# records, CC BY 4.0. See geocode-data/SOURCES.md.

[country]
iso2 = "AU"
name = "Australia"

[postcode]
# 4-digit, range 0200-9944 (state-prefixed: ACT 02xx, NSW 1xxx-2xxx,
# VIC 3xxx-8xxx, QLD 4xxx-9xxx, SA 5xxx, WA 6xxx, TAS 7xxx, NT 08xx).
# Source: Australia Post.
regex = '\b\d{4}\b'
position = "trailing"
canonicalize = "none"

[scripts]
dominant = ["Latin"]
secondary = []

# Australian street types + state codes.
[[lexical_cues.match]]
substring = "street"
boost = 1.0
kind = "word"
[[lexical_cues.match]]
substring = "road"
boost = 1.0
kind = "word"
[[lexical_cues.match]]
substring = "avenue"
boost = 1.0
kind = "word"
[[lexical_cues.match]]
substring = "drive"
boost = 1.0
kind = "word"
[[lexical_cues.match]]
substring = "parade"
boost = 1.2
kind = "word"
[[lexical_cues.match]]
substring = "esplanade"
boost = 1.2
kind = "word"
[[lexical_cues.match]]
substring = "highway"
boost = 1.0
kind = "word"
[[lexical_cues.match]]
substring = "macquarie"
boost = 1.5
kind = "substring"
# State codes (distinctive of AU).
[[lexical_cues.match]]
substring = " nsw"
boost = 1.5
kind = "substring"
[[lexical_cues.match]]
substring = " vic"
boost = 1.5
kind = "substring"
[[lexical_cues.match]]
substring = " qld"
boost = 1.5
kind = "substring"
[[lexical_cues.match]]
substring = " wa "
boost = 1.0
kind = "substring"
[[lexical_cues.match]]
substring = " sa "
boost = 1.0
kind = "substring"
[[lexical_cues.match]]
substring = " tas"
boost = 1.5
kind = "substring"
[[lexical_cues.match]]
substring = " nt "
boost = 1.0
kind = "substring"
[[lexical_cues.match]]
substring = " act"
boost = 1.5
kind = "substring"
# Major cities.
[[lexical_cues.match]]
substring = "sydney"
boost = 2.0
kind = "word"
[[lexical_cues.match]]
substring = "melbourne"
boost = 2.0
kind = "word"
[[lexical_cues.match]]
substring = "brisbane"
boost = 2.0
kind = "word"
[[lexical_cues.match]]
substring = "perth"
boost = 2.0
kind = "word"
[[lexical_cues.match]]
substring = "adelaide"
boost = 2.0
kind = "word"
[[lexical_cues.match]]
substring = "canberra"
boost = 2.0
kind = "word"
[[lexical_cues.match]]
substring = "hobart"
boost = 2.0
kind = "word"
[[lexical_cues.match]]
substring = "darwin"
boost = 2.0
kind = "word"
[[lexical_cues.match]]
substring = "gold coast"
boost = 2.0
kind = "substring"

[bbox]
min_lat = -43.65
max_lat = -10.69
min_lon = 113.16
max_lon = 153.64

[neighbours]
codes = []

[source_priors]
osm = 0.7
authoritative = 1.0

[osm_tags]
postcode = "addr:postcode"
street = "addr:street"
housenumber = "addr:housenumber"
city = "addr:city"
