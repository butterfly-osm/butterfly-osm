[workspace]
resolver = "2"
members = [
    "butterfly-common",
    "butterfly-dl",
    "butterfly-io",
    "butterfly-plan",
    "butterfly-extract",
    "butterfly-geometry",
    "butterfly-routing",
    "butterfly-serve",
    "butterfly-test",
]

[workspace.package]
version = "2.0.0"
authors = ["Pierre <pierre@warnier.net>"]
license = "MIT"
repository = "https://github.com/butterfly-osm/butterfly-osm"
edition = "2021"

[workspace.dependencies]
tokio = { version = "1.45", features = ["full"] }
reqwest = { version = "0.12", default-features = false, features = ["stream"] }
clap = { version = "4.5", features = ["derive"] }
thiserror = "2.0"
env_logger = "0.11"
indicatif = "0.17"
strsim = "0.11"
tempfile = "3.3"
osmpbf = "0.2"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
chrono = { version = "0.4", features = ["serde"] }
# Dev dependencies
wiremock = "0.6"
ctor = "0.4"