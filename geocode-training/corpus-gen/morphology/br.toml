## Brazil morphology table.
##
## Brazilian addresses use Portuguese conventions: street type
## (logradouro) PREFIXED to the name ("Rua do Ouvidor", "Avenida
## Paulista"). Postcode (CEP) is 8 digits formatted "12345-678" and
## conventionally goes leading on a separate line; in single-line
## form it goes before the city.

[country]
iso2 = "BR"
name = "Brazil"

[render]
field_separator_after_house = ", "
postcode_city_separator = " "
postcode_position = "leading"

[postcode]
## CEP: 5 digits, optional hyphen, 3 digits.
regex = '^[0-9]{5}-?[0-9]{3}$'
format = "{}"

[street_types]
long_to_short = [
    ["Rua", "R."],
    ["Avenida", "Av."],
    ["Travessa", "Tv."],
    ["Praça", "Pç."],
    ["Alameda", "Al."],
    ["Estrada", "Estr."],
    ["Rodovia", "Rod."],
    ["Largo", "Lgo."],
    ["Beco", "Bc."],
    ["São", "S."],
    ["Santa", "Sta."],
    ["Santo", "Sto."],
]

## Portuguese street types are PREFIXED to the name. Markers identify
## the leading word.
[street_types.markers]
pt = ["rua", "avenida", "travessa", "praça", "alameda", "estrada", "rodovia", "largo", "beco", "ladeira", "viaduto"]
