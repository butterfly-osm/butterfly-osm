## Switzerland morphology table.
##
## Switzerland is multilingual (DE, FR, IT, RM). The postcode (4-digit
## PLZ/NPA) leads, then city. Street types are mixed: German-style
## suffix-compounds in DE-CH ("Bahnhofstrasse"), French-style prefixes
## in FR-CH ("Rue du Mont-Blanc"), Italian-style prefixes in IT-CH
## ("Via Nassa").

[country]
iso2 = "CH"
name = "Switzerland"

[render]
field_separator_after_house = ", "
postcode_city_separator = " "
postcode_position = "leading"

[postcode]
## 4-digit Swiss Post PLZ/NPA.
regex = '^[1-9][0-9]{3}$'
format = "{}"

[street_types]
long_to_short = [
    # DE-CH (Strasse with ss, never ß).
    ["Strasse", "Str."],
    ["Platz", "Pl."],
    ["Weg", "Wg."],
    ["Allee", "Al."],
    ["Gasse", "G."],
    # FR-CH.
    ["Rue", "R."],
    ["Avenue", "Av."],
    ["Boulevard", "Bd"],
    ["Place", "Pl."],
    ["Chemin", "Ch."],
    ["Route", "Rte"],
    ["Saint", "St"],
    # IT-CH.
    ["Via", "V."],
    ["Viale", "V.le"],
    ["Piazza", "P.za"],
    ["Vicolo", "Vic."],
]

## Swiss markers — three language tables.
[street_types.markers]
de = ["strasse", "platz", "weg", "allee", "gasse", "ring"]
fr = ["rue", "avenue", "boulevard", "place", "chemin", "route", "impasse", "ruelle"]
it = ["via", "viale", "piazza", "vicolo", "corso", "salita"]
