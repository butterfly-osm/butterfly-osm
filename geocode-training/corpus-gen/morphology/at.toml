## Austria morphology table.
##
## Austrian addresses follow German-language conventions: postcode
## leading, street type suffixed onto the street name as a compound
## ("Mariahilfer Straße", "Stephansplatz"). Postcode is 4 digits.

[country]
iso2 = "AT"
name = "Austria"

[render]
field_separator_after_house = ", "
postcode_city_separator = " "
postcode_position = "leading"

[postcode]
## 4-digit Austrian Post PLZ.
regex = '^[1-9][0-9]{3}$'
format = "{}"

[street_types]
long_to_short = [
    ["Straße", "Str."],
    ["Strasse", "Str."],
    ["Platz", "Pl."],
    ["Allee", "Al."],
    ["Weg", "Wg."],
    ["Gasse", "G."],
    ["Sankt", "St"],
]

## Austrian street types are SUFFIXED to the noun (compound) like in
## Germany. Markers identify the suffix segment of a compound street.
[street_types.markers]
de = ["straße", "strasse", "platz", "allee", "weg", "gasse", "ring", "ufer", "berg", "gürtel"]
