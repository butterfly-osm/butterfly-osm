## Australia morphology table.
##
## Australian addresses use the Anglo "Number Street, Suburb State Postcode"
## form ("123 George Street, Sydney NSW 2000"). Street types are SUFFIXED.
## Postcode is 4 digits and goes after city/state.

[country]
iso2 = "AU"
name = "Australia"

[render]
## "<street> <hn>, <suburb> <state> <postcode>" — comma after street/HN,
## postcode trails.
field_separator_after_house = ", "
postcode_city_separator = " "
postcode_position = "trailing"

[postcode]
## 4-digit Australia Post postcode.
regex = '^[0-9]{4}$'
format = "{}"

[street_types]
## Australia Post addressing standard (AS/NZS 4819) abbreviations.
long_to_short = [
    ["Street", "St"],
    ["Avenue", "Ave"],
    ["Boulevard", "Bvd"],
    ["Drive", "Dr"],
    ["Lane", "Ln"],
    ["Road", "Rd"],
    ["Court", "Ct"],
    ["Place", "Pl"],
    ["Highway", "Hwy"],
    ["Parkway", "Pwy"],
    ["Crescent", "Cr"],
    ["Close", "Cl"],
    ["Terrace", "Tce"],
    ["Square", "Sq"],
    ["Esplanade", "Esp"],
    ["Saint", "St"],
    ["North", "N"],
    ["South", "S"],
    ["East", "E"],
    ["West", "W"],
]

[street_types.markers]
au = ["street", "avenue", "boulevard", "drive", "lane", "road", "court", "highway", "crescent", "terrace", "esplanade", "parade"]
