# Butterfly region index — Germany
#
# OSM PBF for Germany from Geofabrik plus state-level OpenAddresses
# packs (#96 §"Data Sources"). Germany has no nationally unified
# authoritative open address dataset; OpenAddresses ingests every
# Bundesland that publishes openly (NRW, BW, Niedersachsen, Hessen,
# Rheinland-Pfalz, Sachsen, Brandenburg, Schleswig-Holstein, Sachsen-
# Anhalt, Thüringen, Mecklenburg-Vorpommern, Saarland, Hamburg,
# Bremen — currently 14 of 16 states).
#
# This index lists all 14 states. Operators wanting only one state
# can fetch a subset by editing the file or via a future
# `butterfly-dl --only states=NRW,BW` filter.
#
# Verified live 2026-05-05.
#
# No transit feeds — DELFI's national GTFS merge is out of scope.

[pbf]
url = "https://download.geofabrik.de/europe/germany-latest.osm.pbf"

[[address]]
id     = "oa-de-nw"
url    = "https://v2.openaddresses.io/batch-prod/job/824008/source.geojson.gz"
format = "geojson-gz"
source = "openaddresses"

