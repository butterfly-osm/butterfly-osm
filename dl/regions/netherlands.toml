# Butterfly region index — Netherlands
#
# OSM PBF for the Netherlands from Geofabrik plus OpenAddresses
# (#96 §"Data Sources").
#
# OpenAddresses' Netherlands pack (`nl/countrywide`, ~296 MB
# compressed) ingests BAG (Basisregistratie Adressen en Gebouwen)
# into the OA normalised schema. butterfly-geocode reads it via the
# OpenAddresses streaming loader (no per-source code path).
#
# Verified live 2026-05-05. Job IDs pin the snapshot — refresh by
# querying `https://batch.openaddresses.io/api/data?source=nl` and
# updating the job number.
#
# No transit feeds — Dutch GTFS is published per operator via
# OpenOV / NDOV and is out of scope here.

[pbf]
url = "https://download.geofabrik.de/europe/netherlands-latest.osm.pbf"

[[address]]
id     = "oa-nl-countrywide"
url    = "https://v2.openaddresses.io/batch-prod/job/823433/source.geojson.gz"
format = "geojson-gz"
source = "openaddresses"
