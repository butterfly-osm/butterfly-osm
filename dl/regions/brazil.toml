# Butterfly region index — Brazil
#
# OSM PBF for Brazil from Geofabrik plus state-level OpenAddresses
# packs (#96 §"Data Sources"). Brazil has no national OA pack but
# several state-level packs of substantial size (São Paulo's pack
# alone is ~1.3 GB compressed).
#
# Verified live 2026-05-05.

[pbf]
url = "https://download.geofabrik.de/south-america/brazil-latest.osm.pbf"

[[address]]
id     = "oa-br-sp"
url    = "https://v2.openaddresses.io/batch-prod/job/824365/source.geojson.gz"
format = "geojson-gz"
source = "openaddresses"

