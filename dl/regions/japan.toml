# Butterfly region index — Japan
#
# OSM PBF for Japan from Geofabrik plus prefecture-level
# OpenAddresses packs (#96 §"Data Sources"). Japan has no national
# OpenAddresses pack; OA ingests prefecture-level open address data
# from cities and prefectures that publish openly.
#
# Japanese addresses are block-based (chōme-banchi), not street-
# based. The geocode shard schema's `housenumber` field is repurposed
# to hold the block number; the `street` field is empty for most
# records.
#
# This index lists the top prefectures by OA coverage. Adding more
# prefectures = more `[[address]]` blocks
# (`https://batch.openaddresses.io/api/data?source=jp` enumerates
# every available source).
#
# Verified live 2026-05-05.

[pbf]
url = "https://download.geofabrik.de/asia/japan-latest.osm.pbf"

[[address]]
id     = "oa-jp-aichi"
url    = "https://v2.openaddresses.io/batch-prod/job/823591/source.geojson.gz"
format = "geojson-gz"
source = "openaddresses"

