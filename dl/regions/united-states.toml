# Butterfly region index — United States
#
# OSM PBF for the US from Geofabrik plus state-level OpenAddresses
# packs (#96 §"Data Sources"). The US has no nationally unified
# authoritative open address dataset; OpenAddresses ingests state
# and county datasets state-by-state.
#
# This index lists the top statewide packs by size for "USA-wide
# server" deployments. Operators wanting one state can fetch a
# subset by editing the file. Adding more states = more
# `[[address]]` blocks (the OA batch API at
# `https://batch.openaddresses.io/api/data?source=us` enumerates
# every available source).
#
# The full US is ~9 GB OSM PBF + ~5-7 GB OA addresses. Geocode shard
# build is feasible on machines with 32+ GB RAM.
#
# Verified live 2026-05-05.

[pbf]
url = "https://download.geofabrik.de/north-america/us-latest.osm.pbf"

# Smaller states first — easier smoke-test path.
[[address]]
id     = "oa-us-dc"
url    = "https://v2.openaddresses.io/batch-prod/job/802939/source.geojson.gz"
format = "geojson-gz"
source = "openaddresses"

[[address]]
id     = "oa-us-de"
url    = "https://v2.openaddresses.io/batch-prod/job/822656/source.geojson.gz"
format = "geojson-gz"
source = "openaddresses"

